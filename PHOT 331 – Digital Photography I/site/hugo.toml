baseURL = "https://syllabi.adamsimms.xyz/phot331/"
title = "Digital Photography I"
theme = "hugo-book"

copyright = "[Adam Simms](https://www.concordia.ca/faculty/adam-simms.html) · [CC BY 4.0](https://creativecommons.org/licenses/by/4.0/)"

disablePathToLower = true
disableKinds = ["taxonomy", "term"]
publishDir = "_site"

[outputs]
  home = ["HTML", "TXT"]
  page = ["HTML", "TXT"]
  section = ["HTML", "TXT"]

[outputFormats.TXT]
  mediaType = "text/plain"
  baseName = "index"
  isPlainText = true

[sitemap]
  changefreq = "monthly"
  priority = 0.5

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 4
  [markup.highlight]
    style = "github"

[params]
  BookTheme = "light"
  BookToC = false
  BookSearch = false
  BookComments = false
  BookSection = "/"
  BookRepo = "https://github.com/adamsimms/syllabi"
  BookFavicon = "favicon.svg"
  courseCode = "PHOT 331"
  courseTitle = "Digital Photography I"
  courseTerms = ["Winter 2022", "Winter 2025"]
  appointmentsUrl = "https://cal.com/adam-simms-ivi9mt/1-hour-meeting"
  socialImage = "images/colorchecker.jpg"
  socialImageOg = "images/og-square.jpg"
  socialImageWidth = 1200
  socialImageHeight = 1200
  siteDescription = "PHOT 331 Digital Photography I — open syllabus and course materials taught by Adam Simms at Concordia University."

[params.hero]
  alt = "X-Rite ColorChecker Classic chart used for colour calibration in digital photography"
  caption = "X-Rite — ColorChecker Classic"
  creditUrl = "https://www.xrite.com/categories/calibration/colorchecker-classic"
