baseURL = "https://syllabi.adamsimms.xyz/phot332/"
title = "Digital Photography II"
theme = "hugo-book"

copyright = "[Adam Simms](https://www.concordia.ca/faculty/adam-simms.html) · [CC BY 4.0](https://creativecommons.org/licenses/by/4.0/)"

disablePathToLower = true
disableKinds = ["taxonomy", "term"]
publishDir = "_site"

[outputs]
  home = ["HTML", "TXT"]
  page = ["HTML", "TXT"]
  section = ["HTML", "TXT"]

[outputFormats.TXT]
  mediaType = "text/plain"
  baseName = "index"
  isPlainText = true

[sitemap]
  changefreq = "monthly"
  priority = 0.5

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 4
  [markup.highlight]
    style = "github"

[params]
  BookTheme = "light"
  BookToC = false
  BookSearch = false
  BookComments = false
  BookSection = "/"
  BookRepo = "https://github.com/adamsimms/syllabi"
  BookFavicon = "favicon.svg"
  courseCode = "PHOT 332"
  courseTitle = "Digital Photography II"
  appointmentsUrl = "https://cal.com/adam-simms-ivi9mt/1-hour-meeting"
  socialImage = "images/conelrad-v09.jpg"
  socialImageOg = "images/og-square.jpg"
  socialImageWidth = 1200
  socialImageHeight = 1200
  siteDescription = "PHOT 332 Digital Photography II — open syllabus and course materials taught by Adam Simms at Concordia University."

[params.hero]
  alt = "Hasan Elahi, Conelrad v09 — pigment print on canvas, 72 × 39 inches, 2016"
  caption = "Hasan Elahi — Conelrad v09"
  creditUrl = "http://elahi.wayne.edu/elahi_conelrad_09.php"
