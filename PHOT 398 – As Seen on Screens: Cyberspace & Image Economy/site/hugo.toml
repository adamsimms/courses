baseURL = "https://syllabi.adamsimms.xyz/phot398/"
title = "As Seen on Screens: Cyberspace & Image Economy"
theme = "hugo-book"

copyright = "[Adam Simms](https://www.concordia.ca/faculty/adam-simms.html) · [CC BY 4.0](https://creativecommons.org/licenses/by/4.0/)"

disablePathToLower = true
disableKinds = ["taxonomy", "term"]
publishDir = "_site"

[outputs]
  home = ["HTML", "TXT"]
  page = ["HTML", "TXT"]
  section = ["HTML", "TXT"]

[outputFormats.TXT]
  mediaType = "text/plain"
  baseName = "index"
  isPlainText = true

[sitemap]
  changefreq = "monthly"
  priority = 0.5

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 4
  [markup.highlight]
    style = "github"

[params]
  BookTheme = "light"
  BookToC = false
  BookSearch = false
  BookComments = false
  BookSection = "/"
  BookRepo = "https://github.com/adamsimms/syllabi"
  BookFavicon = "favicon.svg"
  courseCode = "PHOT 398"
  courseTitle = "As Seen on Screens: <em>Cyberspace & Image Economy</em>"
  appointmentsUrl = "https://cal.com/adam-simms-ivi9mt/1-hour-meeting"
  socialImage = "images/curiosity-selfie.jpg"
  socialImageOg = "images/og-square.jpg"
  socialImageWidth = 1200
  socialImageHeight = 1200
  siteDescription = "PHOT 398 As Seen on Screens — open syllabus on cyberspace and the image economy, taught by Adam Simms at Concordia University."

[params.hero]
  alt = "NASA Curiosity rover selfie during a Martian dust storm at Gale Crater"
  caption = "NASA — Curiosity's Dusty Selfie"
  creditUrl = "https://images.nasa.gov/details/PIA22486"
