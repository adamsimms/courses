{{- if not .IsHome -}}
<nav class="book-breadcrumbs" aria-label="Breadcrumb">
  <ol>
    <li><a href="{{ .Site.Home.RelPermalink }}">{{ .Site.Params.courseCode }}</a></li>
    {{- range .Ancestors.Reverse -}}
      {{- if ne .RelPermalink $.Site.Home.RelPermalink -}}
    <li><a href="{{ .RelPermalink }}">{{ partial "docs/title" . | plainify }}</a></li>
      {{- end -}}
    {{- end -}}
    <li aria-current="page">{{ partial "docs/title" . | plainify }}</li>
  </ol>
</nav>
{{- end -}}
