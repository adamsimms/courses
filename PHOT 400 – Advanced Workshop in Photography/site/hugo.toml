baseURL = "https://adamsimms.xyz/courses/phot400/"
title = "Advanced Workshop in Photography"
theme = "hugo-book"

copyright = "[Adam Simms](https://www.concordia.ca/faculty/adam-simms.html) · [CC BY 4.0](https://creativecommons.org/licenses/by/4.0/)"

disablePathToLower = true
publishDir = "_site"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 4
  [markup.highlight]
    style = "github"

[params]
  BookTheme = "light"
  BookToC = false
  BookSearch = false
  BookComments = false
  BookSection = "/"
  BookRepo = "https://github.com/adamsimms/syllabi"
  BookFavicon = "favicon.svg"
  courseCode = "PHOT 400"
  courseTitle = "Advanced Workshop in Photography"
  appointmentsUrl = "https://cal.com/adam-simms-ivi9mt/1-hour-meeting"
  socialImage = "images/workshop-hero.jpg"

[params.hero]
  alt = "Tyren Lee — portrait photographed on LomoChrome Purple film"
  caption = "Tyren Lee — LomoChrome Purple"
  creditUrl = "https://www.lomography.com/magazine/358663-invisible-purple-hues-tyren-lee-tyrenl-on-using-lomochrome-purple-to-raise-lupus-awareness"
